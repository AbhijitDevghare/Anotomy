<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive Muscle Pain Map</title>
    <style>
:root {
  --primary-color: #2c7be5;
  --accent-color: #00a8a8;
  --text-color: #1c2b36;
  --page-bg: #ffffff;
  --ink: var(--text-color);
  --muted: #5d7285;
  --card-bg: rgba(255, 255, 255, 0.96);
  --card-border: rgba(44, 123, 229, 0.2);
  --pain-red: #ff2f3f;
  --path-stroke: rgba(255, 55, 72, 0.2);
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  background: var(--page-bg);
  color: var(--ink);
  font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
}

body {
  min-height: 100vh;
  display: grid;
  place-items: center;
}

.pain-map-section {
  width: 100%;
  padding: 48px 16px 56px;
  background: var(--page-bg);
}

.container {
  width: min(96vw, 920px);
  margin: 0 auto;
  text-align: center;
}

.pain-map-heading {
  margin: 0 0 8px;
  font-size: clamp(1.4rem, 2vw + 1rem, 2.2rem);
  color: var(--text-color);
  letter-spacing: 0.02em;
}

.pain-map-subtitle {
  margin: 0 0 28px;
  color: var(--muted);
  font-size: clamp(0.9rem, 0.7vw + 0.7rem, 1.05rem);
}

.anatomy-container {
  position: relative;
  width: min(96vw, 610px);
  margin: 0 auto;
  aspect-ratio: 3124 / 5284;
  border-radius: 18px;
  overflow: visible;
  box-shadow:
    0 12px 36px rgba(31, 56, 78, 0.16),
    inset 0 0 0 1px rgba(27, 61, 87, 0.12);
  background:
    linear-gradient(180deg, rgba(228, 241, 255, 0.56), rgba(255, 255, 255, 0.9)),
    #ffffff;
}

.anatomy-image,
.overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.anatomy-image {
  object-fit: fill;
  user-select: none;
  pointer-events: none;
  filter: hue-rotate(170deg) saturate(270%) contrast(1.12) brightness(0.88);
}

.overlay {
  pointer-events: none;
  overflow: visible;
}

.muscle-path {
  pointer-events: all;
  fill: var(--pain-red);
  fill-opacity: 0;
  stroke: var(--path-stroke);
  stroke-opacity: 0;
  stroke-width: 2.2;
  cursor: pointer;
  transition:
    fill-opacity 0.22s ease,
    stroke-opacity 0.22s ease,
    filter 0.22s ease;
}

.muscle-path[id^="hand-"],
.muscle-path[id^="quadriceps"],
.muscle-path[id^="hamstrings"],
.muscle-path[id^="tensor-fasciae-latae"],
.muscle-path[id^="adductor-group"],
.muscle-path[id^="sartorius"],
.muscle-path[id^="knee"],
.muscle-path[id^="calves"],
.muscle-path[id^="tibialis-anterior"],
.muscle-path[id^="ankles"] {
  stroke-width: 4.8;
}

.anatomy-container.show-regions .muscle-path {
  fill-opacity: 0.08;
  stroke-opacity: 0.4;
}

.muscle-path:hover,
.muscle-path:focus-visible,
.muscle-path.active {
  fill-opacity: 0.42;
  stroke-opacity: 0.95;
  filter: drop-shadow(0 0 7px rgba(255, 42, 58, 0.75));
}

.anatomy-container.show-regions .muscle-path:hover,
.anatomy-container.show-regions .muscle-path:focus-visible,
.anatomy-container.show-regions .muscle-path.active {
  fill-opacity: 0.42;
  stroke-opacity: 0.95;
}

.muscle-path:focus-visible {
  outline: none;
}

.hover-preview {
  position: absolute;
  z-index: 14;
  width: clamp(180px, 30vw, 265px);
  padding: 8px 11px;
  border-radius: 10px;
  border: 1px solid rgba(22, 63, 94, 0.35);
  background: rgba(20, 58, 88, 0.92);
  color: #f4fbff;
  font-size: 0.78rem;
  letter-spacing: 0.01em;
  text-align: left;
  white-space: normal;
  pointer-events: none;
  box-shadow:
    0 8px 20px rgba(14, 35, 54, 0.24),
    inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.14s ease, transform 0.14s ease;
  will-change: left, top, opacity, transform;
}

.hover-preview.visible {
  opacity: 1;
  transform: translateY(0);
}

.hover-name {
  margin: 0 0 4px;
  font-size: 0.84rem;
  font-weight: 700;
  line-height: 1.2;
  color: #ffffff;
}

.hover-description {
  margin: 0;
  font-size: 0.74rem;
  line-height: 1.3;
  color: #dcefff;
}

.tooltip-card {
  position: absolute;
  z-index: 20;
  max-width: min(280px, 84%);
  text-align: left;
  padding: 14px 14px 12px;
  border-radius: 14px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  box-shadow:
    0 14px 34px rgba(20, 44, 68, 0.25),
    0 2px 8px rgba(20, 44, 68, 0.1);
  backdrop-filter: blur(4px);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.tooltip-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.tooltip-close {
  position: absolute;
  top: 8px;
  right: 8px;
  border: 0;
  background: #eaf3ff;
  color: #184b75;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  line-height: 1;
  font-weight: 700;
}

.tooltip-close:hover {
  background: #dcecff;
}

.tooltip-card h2 {
  margin: 0 26px 7px 0;
  font-size: 1.1rem;
  color: #163b59;
}

.tooltip-card p {
  margin: 0;
  font-size: 0.9rem;
  line-height: 1.45;
  color: #2e4f67;
}

.pain-line {
  margin-top: 8px !important;
}

.function-line {
  margin-top: 8px !important;
}

@media (max-width: 760px) {
  .anatomy-container {
    width: min(98vw, 520px);
    border-radius: 12px;
  }

  .tooltip-card {
    max-width: min(250px, 90%);
    font-size: 0.92rem;
  }

  .hover-preview {
    width: min(220px, 88%);
  }
}

@media (max-width: 768px) {
  .tooltip-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) !important;
    max-width: min(320px, 92vw);
    z-index: 100;
  }

  .tooltip-card.visible {
    transform: translate(-50%, -50%) !important;
  }
}
    </style>

    <script>
document.addEventListener("DOMContentLoaded", function () {
  const muscles = {
    frontalis: {
      name: "Frontalis",
      description: "Forehead muscle that lifts the eyebrows and wrinkles the brow.",
      function: "Elevates the eyebrows and assists facial expression.",
      pain: "Pain may be linked to facial tension, stress, or headache-related strain."
    },
    temporalis: {
      name: "Temporalis",
      description: "Fan-shaped muscle on the side of the skull involved in chewing.",
      function: "Elevates and retracts the jaw during biting and mastication.",
      pain: "Pain may be linked to jaw clenching, TMJ stress, or tension headaches."
    },
    "jaw-muscles": {
      name: "Jaw Muscles",
      description: "Masseter-dominant region that powers chewing and jaw closure.",
      function: "Generates bite force and stabilizes mandibular movement.",
      pain: "Pain may indicate bruxism, overuse, or temporomandibular dysfunction."
    },
    "neck-muscles": {
      name: "Neck Muscles",
      description: "Anterior cervical muscles that support head position and control motion.",
      function: "Supports neck flexion, extension, and postural stabilization.",
      pain: "Pain may result from poor posture, strain, or sustained static loading."
    },
    sternocleidomastoid: {
      name: "Sternocleidomastoid",
      description: "Prominent neck muscle running from mastoid to clavicle and sternum.",
      function: "Rotates and flexes the neck while stabilizing the head.",
      pain: "Pain may come from whiplash, posture imbalance, or muscle trigger points."
    },
    deltoid: {
      name: "Deltoid",
      description: "Primary shoulder cap muscle spanning anterior, lateral, and posterior fibers.",
      function: "Abducts and rotates the arm during lifting and reaching tasks.",
      pain: "Pain may indicate tendon irritation, impingement, or muscle overload."
    },
    "pectoralis-major": {
      name: "Pectoralis Major",
      description: "Large superficial chest muscle connecting sternum and humerus.",
      function: "Adducts, flexes, and internally rotates the shoulder.",
      pain: "Pain may occur with pushing overload, strain, or shoulder compensation."
    },
    biceps: {
      name: "Biceps",
      description: "Anterior upper-arm muscle crossing shoulder and elbow joints.",
      function: "Flexes the elbow and supinates the forearm during pulling.",
      pain: "Possible pain includes strain, overuse, or biceps tendon irritation."
    },
    triceps: {
      name: "Triceps",
      description: "Posterior upper-arm extensor with three muscle heads.",
      function: "Extends the elbow during pushing and stabilization tasks.",
      pain: "Pain may indicate overload, extension strain, or tendon inflammation."
    },
    "forearm-extensors": {
      name: "Forearm Extensors",
      description: "Posterolateral forearm group extending wrist and fingers.",
      function: "Stabilizes wrist extension during grasp and load transfer.",
      pain: "Pain may occur with repetitive extension or lateral elbow strain."
    },
    "rectus-abdominis": {
      name: "Rectus Abdominis",
      description: "Central abdominal wall muscle running vertically through the trunk.",
      function: "Supports trunk flexion and core bracing under load.",
      pain: "Pain may indicate abdominal strain, overload, or poor trunk mechanics."
    },
    obliques: {
      name: "Obliques",
      description: "Lateral abdominal layers on each side of the trunk.",
      function: "Drive trunk rotation and side-bending while stabilizing core.",
      pain: "Pain may follow twisting strain, overuse, or side-loading stress."
    },
    quadriceps: {
      name: "Quadriceps",
      description: "Four-muscle anterior thigh group crossing hip and knee.",
      function: "Extends the knee and supports deceleration in gait.",
      pain: "Pain may result from running load, tendon stress, or strain."
    },
    hamstrings: {
      name: "Hamstrings",
      description: "Posterior thigh group spanning hip and knee joints.",
      function: "Flexes the knee and extends the hip during locomotion.",
      pain: "Pain may indicate strain, reduced flexibility, or overuse."
    },
    calves: {
      name: "Calf Muscles",
      description: "Posterior lower-leg gastrocnemius-soleus muscle complex.",
      function: "Plantarflexes the ankle for walking, running, and push-off.",
      pain: "Pain may indicate cramping, strain, tightness, or Achilles overload."
    },
    "tibialis-anterior": {
      name: "Tibialis Anterior",
      description: "Front shin muscle along the lateral tibia.",
      function: "Dorsiflexes the ankle and controls foot placement during gait.",
      pain: "Pain may occur from overuse, running volume, or shin-splint irritation."
    },
    ankles: {
      name: "Ankle Region",
      description: "Distal joint region controlling foot mobility and stability.",
      function: "Supports load transfer, balance, and directional movement.",
      pain: "Pain may be linked to sprain, tendon irritation, or repetitive impact."
    }
  };

  const anatomyContainer = document.getElementById("anatomyContainer");
  const tooltipCard = document.getElementById("tooltipCard");
  const tooltipName = document.getElementById("tooltipName");
  const tooltipDescription = document.getElementById("tooltipDescription");
  const tooltipFunction = document.getElementById("tooltipFunction");
  const tooltipPain = document.getElementById("tooltipPain");
  const tooltipClose = document.getElementById("tooltipClose");
  const hoverPreview = document.getElementById("hoverPreview");
  const hoverName = document.getElementById("hoverName");
  const hoverDescription = document.getElementById("hoverDescription");
  const musclePaths = Array.from(document.querySelectorAll(".muscle-path"));

  let activePath = null;
  let hoverHideTimer = null;
  let hoverAnimationId = 0;
  let hoverTargetPos = { left: 0, top: 0 };
  let hoverCurrentPos = { left: 0, top: 0 };
  let muscleIndex = [];

  function splitRegionId(regionId) {
    const match = regionId.match(/^(.*?)-(left|right)$/);
    if (!match) {
      return { baseId: regionId, side: "" };
    }
    return {
      baseId: match[1],
      side: match[2].charAt(0).toUpperCase() + match[2].slice(1)
    };
  }

  function getMuscleDetails(path) {
    const { baseId, side } = splitRegionId(path.dataset.muscle || path.id);
    const data = muscles[baseId];
    if (!data) return null;
    return { data, label: side ? `${side} ${data.name}` : data.name };
  }

  function buildSearchIndex() {
    muscleIndex = musclePaths
      .map((path) => {
        const info = getMuscleDetails(path);
        if (!info) return null;
        return {
          path,
          label: info.label,
          name: info.data.name,
          key: (path.dataset.muscle || path.id).toLowerCase()
        };
      })
      .filter(Boolean);
  }

  function getConstrainedPosition(element, clientX, clientY, xOffset = 14, yOffset = 14) {
    const containerRect = anatomyContainer.getBoundingClientRect();
    const elementRect = element.getBoundingClientRect();
    let left = clientX - containerRect.left + xOffset;
    let top = clientY - containerRect.top + yOffset;
    if (left + elementRect.width > containerRect.width - 10) left = containerRect.width - elementRect.width - 10;
    if (top + elementRect.height > containerRect.height - 10) top = containerRect.height - elementRect.height - 10;
    return { left: Math.max(10, left), top: Math.max(10, top) };
  }

  function setElementPosition(element, left, top) {
    element.style.left = `${left}px`;
    element.style.top = `${top}px`;
  }

  function positionFloating(element, clientX, clientY, xOffset = 14, yOffset = 14) {
    const next = getConstrainedPosition(element, clientX, clientY, xOffset, yOffset);
    setElementPosition(element, next.left, next.top);
  }

  function stopHoverAnimation() {
    if (hoverAnimationId) {
      cancelAnimationFrame(hoverAnimationId);
      hoverAnimationId = 0;
    }
  }

  function animateHoverPreview() {
    stopHoverAnimation();
    const tick = () => {
      if (hoverPreview.hidden) { hoverAnimationId = 0; return; }
      const dx = hoverTargetPos.left - hoverCurrentPos.left;
      const dy = hoverTargetPos.top - hoverCurrentPos.top;
      hoverCurrentPos.left += dx * 0.24;
      hoverCurrentPos.top += dy * 0.24;
      setElementPosition(hoverPreview, hoverCurrentPos.left, hoverCurrentPos.top);
      if (Math.abs(dx) < 0.4 && Math.abs(dy) < 0.4) {
        hoverCurrentPos = { ...hoverTargetPos };
        setElementPosition(hoverPreview, hoverCurrentPos.left, hoverCurrentPos.top);
        hoverAnimationId = 0;
        return;
      }
      hoverAnimationId = requestAnimationFrame(tick);
    };
    hoverAnimationId = requestAnimationFrame(tick);
  }

  function updateHoverTarget(clientX, clientY, immediate = false) {
    hoverTargetPos = getConstrainedPosition(hoverPreview, clientX, clientY, 12, 12);
    if (immediate || hoverPreview.hidden) {
      hoverCurrentPos = { ...hoverTargetPos };
      setElementPosition(hoverPreview, hoverCurrentPos.left, hoverCurrentPos.top);
      return;
    }
    if (!hoverAnimationId) animateHoverPreview();
  }

  function showHoverPreview(path, sourceEvent) {
    const info = getMuscleDetails(path);
    if (!info) return;
    if (hoverHideTimer) { clearTimeout(hoverHideTimer); hoverHideTimer = null; }
    hoverName.textContent = info.label;
    hoverDescription.textContent = info.data.description;
    const wasHidden = hoverPreview.hidden;
    hoverPreview.hidden = false;
    updateHoverTarget(sourceEvent.clientX, sourceEvent.clientY, wasHidden);
    requestAnimationFrame(() => { hoverPreview.classList.add("visible"); });
  }

  function hideHoverPreview() {
    if (hoverHideTimer) { clearTimeout(hoverHideTimer); hoverHideTimer = null; }
    hoverPreview.classList.remove("visible");
    hoverHideTimer = setTimeout(() => {
      hoverPreview.hidden = true;
      stopHoverAnimation();
    }, 120);
  }

  function closeTooltip() {
    if (activePath) { activePath.classList.remove("active"); activePath = null; }
    tooltipCard.classList.remove("visible");
    tooltipCard.hidden = true;
  }

  function openTooltip(path, triggerEvent) {
    const info = getMuscleDetails(path);
    if (!info) return;
    if (activePath) activePath.classList.remove("active");
    activePath = path;
    activePath.classList.add("active");
    tooltipName.textContent = info.label;
    tooltipDescription.textContent = info.data.description;
    tooltipFunction.textContent = info.data.function;
    tooltipPain.textContent = info.data.pain;
    tooltipCard.hidden = false;
    if (window.innerWidth > 768) {
      positionFloating(tooltipCard, triggerEvent.clientX, triggerEvent.clientY, 18, 18);
    }
    requestAnimationFrame(() => { tooltipCard.classList.add("visible"); });
  }

  buildSearchIndex();

  musclePaths.forEach((path) => {
    path.addEventListener("mouseenter", (e) => showHoverPreview(path, e));
    path.addEventListener("mousemove", (e) => { if (!hoverPreview.hidden) updateHoverTarget(e.clientX, e.clientY); });
    path.addEventListener("mouseleave", () => hideHoverPreview());
    path.addEventListener("focus", () => {
      const rect = path.getBoundingClientRect();
      showHoverPreview(path, { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
    });
    path.addEventListener("blur", () => hideHoverPreview());
    path.addEventListener("click", (e) => { e.stopPropagation(); hideHoverPreview(); openTooltip(path, e); });
    path.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" && e.key !== " ") return;
      e.preventDefault();
      hideHoverPreview();
      const rect = path.getBoundingClientRect();
      openTooltip(path, { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
    });
  });

  tooltipClose.addEventListener("click", (e) => { e.stopPropagation(); closeTooltip(); });

  anatomyContainer.addEventListener("click", (e) => {
    if (!e.target.closest(".muscle-path") && !e.target.closest(".tooltip-card")) {
      hideHoverPreview();
      closeTooltip();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { hideHoverPreview(); closeTooltip(); }
  });
});
    </script>
  </body>
</html>
